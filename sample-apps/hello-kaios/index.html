<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Hello KaiOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <div class="eyebrow">KAI RUNTIME TEST</div>
    <h1>Hello KaiOS</h1>
    <p id="status">Use the D-pad or softkeys.</p>
    <div class="counter">Launches: <strong id="launches">0</strong></div>
    <button class="focused" data-action="battery">Battery</button>
    <button data-action="vibrate">Vibrate</button>
    <button data-action="location">Location</button>
    <button data-action="notify">Notify</button>
  </main>
  <footer><span>Vibrate</span><span>SELECT</span><span>Battery</span></footer>
  <script src="app.js"></script>
</body>
</html>
